    <link rel="stylesheet" href="booking.css">
</head>

            <span></span><span></span><span></span>

    <!-- Booking Content -->
    <section class="booking-section">
        <div class="booking-card">
            <h1 class="section-title">Reserve A Table</h1>
            <div class="accent-line"></div>
            <p class="section-subtitle">Experience the art of fine dining</p>

            <form id="reservationForm">
                <div class="form-field">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your full name" required>
                </div>

                <div class="form-row">
                    <div class="form-field">
                        <label>Reservation Date</label>
                        <input type="date" id="resDate" required>
                    </div>
                    <div class="form-field">
                        <label>Time</label>
                        <div class="time-row">
                            <select id="hour" required>
                                <option value="12">12</option>
                                <option value="01">01</option>
                                <option value="02">02</option>
                                <option value="03">03</option>
                                <option value="04">04</option>
                                <option value="05">05</option>
                                <option value="06">06</option>
                                <option value="07" selected>07</option>
                                <option value="08">08</option>
                                <option value="09">09</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                            </select>
                            <select id="minutes" required>
                                <option value="00">00</option>
                                <option value="15">15</option>
                                <option value="30" selected>30</option>
                                <option value="45">45</option>
                            </select>
                            <select id="ampm" required>
                                <option value="AM">AM</option>
                                <option value="PM" selected>PM</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-field">
                        <label>Number of Guests</label>
                        <select required>
                            <option value="" disabled selected>Select</option>
                            <option value="1">1 Person</option>
                            <option value="2">2 People</option>
                            <option value="4">4 People</option>
                            <option value="5">5 People</option>
                            <option value="6">6+ People</option>
                        </select>
                    </div>
                    <div class="form-field">
                        <label>Phone Number</label>
                        <input type="tel" placeholder="+20 XXX XXXX XXXX">
                    </div>
                </div>

                <div class="form-field">
                    <label>Payment Method</label>
                    <select id="paymentMethod" onchange="checkPayment()">
                        <option value="cash">Cash (Pay at Restaurant)</option>
                        <option value="visa">Visa / Credit Card</option>
                    </select>
                </div>

                <div id="visa-info" class="visa-fields">
                    <div class="form-field">
                        <label>Card Number</label>
                        <input type="text" placeholder="Card Number (16-digits)">
                    </div>
                    <div class="form-row">
                        <div class="form-field">
                            <label>Expiry Date</label>
                            <input type="text" placeholder="MM / YY">
                        </div>
                        <div class="form-field">
                            <label>CVV</label>
                            <input type="password" placeholder="***">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-book">Confirm Booking</button>
            </form>
        </div>
    </section>

</body>
</html>
