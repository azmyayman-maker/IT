<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact us for support or feedback.">
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="nav-bar">
            <a href="index.html" class="logo">CO</a>
            <ul class="nav-list">
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">My Courses</a></li>
                <li><a href="add-course.html">Add Course</a></li>
                <li><a href="contact.html" class="active">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-section">
            <h1>Contact Us</h1>
            <div class="contact-details">
                <p><strong>Email:</strong> support@courseorg.com</p>
                <p><strong>Location:</strong> Faculty of Computers & Information, Cairo, Egypt</p>
                <p><strong>Hours:</strong> Sun - Thu, 9 AM - 4 PM</p>
            </div>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="full-name">Full Name</label>
                    <input type="text" id="full-name" name="full-name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn">Send</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Personal Course Organizer</p>
    </footer>
</body>
</html>
