<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with the CourseOrg team for support or feedback.">
    <title>Contact Us - co.</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="index.html" class="logo">co.</a>
            <nav class="nav-bar">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="courses.html" class="nav-link">My Courses</a></li>
                    <li><a href="add-course.html" class="nav-link">Add Course</a></li>
                    <li><a href="contact.html" class="nav-link active">Contact Us</a></li>
                </ul>
                <button class="menu-toggle" aria-label="Toggle navigation">
                    <span></span>
                    <span></span>
                </button>
            </nav>
        </div>
    </header>

    <main>
        <section class="page-top">
            <div class="container">
                <p class="label">Get In Touch</p>
                <h1>Contact Us</h1>
            </div>
        </section>

        <section class="contact-section">
            <div class="container">
                <div class="contact-grid">
                    <div class="contact-info">
                        <div class="info-item">
                            <h3>Email</h3>
                            <p>support@courseorg.com</p>
                        </div>
                        <div class="info-item">
                            <h3>Location</h3>
                            <p>Faculty of Computers & Information<br>Cairo, Egypt</p>
                        </div>
                        <div class="info-item">
                            <h3>Hours</h3>
                            <p>Sun - Thu, 9 AM - 4 PM</p>
                        </div>
                    </div>
                    <form class="contact-form" action="#" method="post">
                        <div class="form-group">
                            <label for="full-name">Full Name</label>
                            <input type="text" id="full-name" name="full-name" placeholder="Your name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="you@example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" name="subject" placeholder="Topic" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="4" placeholder="Your message..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-full">Send</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>2026 co.</p>
        </div>
    </footer>
</body>
</html>
